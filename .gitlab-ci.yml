# Private GitLab Pages: publishes the self-contained experiments/report.html as the site,
# restricted to project members (set pages_access_level=private on the project). report.html
# embeds all images + replay frames, so the "build" is just a copy — no toolchain.
# Mirrors world-commander-bench/.gitlab-ci.yml. Public publishing is retired (it caused a
# GitHub account suspension on 2026-06-20); keep Pages private.
image: alpine:latest

pages:
  stage: deploy
  script:
    - mkdir -p public
    - cp experiments/report.html public/index.html
  artifacts:
    paths:
      - public
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
